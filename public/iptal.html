<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervasyon İptal — Fatih Kurt Hair Artist</title>
<link rel="icon" href="favicondark.png" media="(prefers-color-scheme: light)">
<link rel="icon" href="favicon.png" media="(prefers-color-scheme: dark)">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#eeebe5;
  color:#111111;
  font-family:'Montserrat',sans-serif;
  font-weight:400;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  -webkit-font-smoothing:antialiased;
}

.kart{
  background:#ffffff;
  border:1px solid #d4cfc7;
  width:100%;
  max-width:460px;
  box-shadow:0 4px 24px rgba(0,0,0,.10);
}

.kart-ust{
  background:#f7f4ef;
  padding:36px 28px 30px;
  text-align:center;
  border-bottom:1px solid #d4cfc7;
}

.ikon{
  width:60px;height:60px;
  border:2px solid rgba(180,40,40,.4);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  background:rgba(180,40,40,.07);
}
.ikon svg{width:24px;height:24px;color:#b42828}

.kart-ust h1{
  font-family:'Playfair Display',serif;
  font-size:1.55rem;
  font-weight:700;
  color:#111111;
  margin-bottom:10px;
  line-height:1.25;
}
.kart-ust p{
  font-size:.88rem;
  color:#444444;
  line-height:1.75;
  font-weight:400;
}

.rez-detay{
  padding:20px 28px;
  border-bottom:1px solid #d4cfc7;
  display:none;
}
.rez-detay.show{display:block}

.detay-satir{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  padding:13px 0;
  border-bottom:1px solid #e8e4de;
}
.detay-satir:last-child{border-bottom:none}

.detay-key{
  font-size:.75rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#666666;
  font-weight:600;
  flex-shrink:0;
  padding-top:1px;
}
.detay-val{
  font-size:.95rem;
  color:#111111;
  text-align:right;
  font-weight:500;
  line-height:1.4;
}

.kart-alt{padding:22px 28px 28px}

.btn-iptal{
  display:block;width:100%;
  background:#b42828;
  color:#ffffff;
  border:none;
  padding:18px;
  font-family:'Montserrat',sans-serif;
  font-size:.8rem;
  font-weight:600;
  letter-spacing:.16em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .2s;
  margin-bottom:10px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn-iptal:hover{background:#9a2020}
.btn-iptal:active{background:#7e1a1a}
.btn-iptal:disabled{background:#cccccc;color:#888888;cursor:not-allowed}

.btn-geri{
  display:block;width:100%;
  background:#ffffff;
  color:#333333;
  border:1.5px solid #bbb8b2;
  padding:16px;
  font-family:'Montserrat',sans-serif;
  font-size:.78rem;
  font-weight:500;
  letter-spacing:.13em;
  text-transform:uppercase;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn-geri:hover{border-color:#888;color:#111}
.btn-geri:active{background:#f0ede8}

.mesaj{
  display:none;
  font-size:.85rem;
  font-weight:500;
  padding:14px 16px;
  margin-bottom:14px;
  line-height:1.55;
}
.mesaj.basari{
  background:#eaf7f0;
  border:1.5px solid #2a9e60;
  color:#1a6e3e;
}
.mesaj.hata{
  background:#fbeaea;
  border:1.5px solid #b42828;
  color:#8a1e1e;
}

.yukleniyor{
  padding:44px 28px;
  text-align:center;
  font-size:.85rem;
  color:#666666;
  letter-spacing:.06em;
  font-weight:400;
}
.yukleniyor-dot{
  width:10px;height:10px;
  background:#bbb;
  border-radius:50%;
  margin:0 auto 18px;
  animation:pulse 1.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}

.bulunamadi{
  padding:36px 28px;
  text-align:center;
  display:none;
}
.bulunamadi p{
  font-size:.9rem;
  color:#444444;
  line-height:1.8;
  font-weight:400;
}

.alt-logo{
  text-align:center;
  margin-top:20px;
}
.alt-logo a{
  text-decoration:none;
  font-family:'Playfair Display',serif;
  font-size:.95rem;
  color:#555555;
  font-style:italic;
}

@media(max-width:480px){
  body{padding:12px;align-items:flex-start;padding-top:20px}
  .kart-ust{padding:28px 18px 22px}
  .rez-detay{padding:14px 18px}
  .kart-alt{padding:16px 18px 22px}
  .kart-ust h1{font-size:1.3rem}
  .kart-ust p{font-size:.84rem}
  .detay-key{font-size:.7rem}
  .detay-val{font-size:.9rem}
  .btn-iptal{padding:20px;font-size:.82rem}
  .btn-geri{padding:17px;font-size:.78rem}
}
</style>
</head>
<body>

<div style="width:100%;max-width:460px;">
  <div class="kart">
    <div class="kart-ust">
      <div class="ikon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
      <h1>Rezervasyon İptali</h1>
      <p>Rezervasyonunuzu iptal etmek üzeresiniz.<br>Bu işlem geri alınamaz.</p>
    </div>

    <div class="yukleniyor" id="yukleniyor">
      <div class="yukleniyor-dot"></div>
      Rezervasyon bilgileri yükleniyor…
    </div>

    <div class="bulunamadi" id="bulunamadi">
      <p>Rezervasyon bulunamadı veya<br>bu link geçersiz.</p>
    </div>

    <div class="rez-detay" id="rez-detay">
      <div class="detay-satir">
        <span class="detay-key">Ad Soyad</span>
        <span class="detay-val" id="d-ad">—</span>
      </div>
      <div class="detay-satir">
        <span class="detay-key">Hizmet</span>
        <span class="detay-val" id="d-hizmet">—</span>
      </div>
      <div class="detay-satir">
        <span class="detay-key">Tarih</span>
        <span class="detay-val" id="d-tarih">—</span>
      </div>
      <div class="detay-satir">
        <span class="detay-key">Saat</span>
        <span class="detay-val" id="d-saat">—</span>
      </div>
      <div class="detay-satir">
        <span class="detay-key">Durum</span>
        <span class="detay-val" id="d-durum">—</span>
      </div>
    </div>

    <div class="kart-alt" id="kart-alt" style="display:none">
      <div class="mesaj" id="mesaj"></div>
      <button class="btn-iptal" id="btn-iptal" onclick="iptalEt()">Rezervasyonu İptal Et</button>
      <a href="/" class="btn-geri">Ana Sayfaya Dön</a>
    </div>
  </div>

  <div class="alt-logo">
    <a href="/">Fatih Kurt Hair Artist</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://botxnihztrnwzjnrlwzv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdHhuaWh6dHJud3pqbnJsd3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTg4MTAsImV4cCI6MjA5MDA5NDgxMH0.AcX4_2Aykf8J1jln9fvODh2rRffymfEJCAekzmN1ALg';

const params = new URLSearchParams(window.location.search);
const REZ_ID = params.get('id');

function tarihFormatla(tarihStr) {
  if (!tarihStr) return '—';
  const d = new Date(tarihStr + 'T00:00:00');
  const aylar = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  return d.getDate() + ' ' + aylar[d.getMonth()] + ' ' + d.getFullYear();
}

async function rezervasyonYukle() {
  if (!REZ_ID) {
    document.getElementById('yukleniyor').style.display = 'none';
    document.getElementById('bulunamadi').style.display = 'block';
    return;
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rezervasyonlar?id=eq.${REZ_ID}&select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    document.getElementById('yukleniyor').style.display = 'none';
    if (!data || !data.length) {
      document.getElementById('bulunamadi').style.display = 'block';
      return;
    }
    const r = data[0];
    document.getElementById('d-ad').textContent = r.ad || '—';
    document.getElementById('d-hizmet').textContent = r.hizmet || '—';
    document.getElementById('d-tarih').textContent = tarihFormatla(r.tarih);
    document.getElementById('d-saat').textContent = r.saat || '—';
    const durumEl = document.getElementById('d-durum');
    if (r.durum === 'iptal_edildi') {
      durumEl.textContent = 'Zaten iptal edildi';
      durumEl.style.color = '#b42828';
      document.getElementById('btn-iptal').disabled = true;
      document.getElementById('btn-iptal').textContent = 'Bu rezervasyon zaten iptal edildi';
    } else {
      durumEl.textContent = r.durum === 'onaylandi' ? 'Onaylandı' : 'Bekliyor';
      durumEl.style.color = r.durum === 'onaylandi' ? '#1a6e3e' : '#8a6500';
    }
    document.getElementById('rez-detay').classList.add('show');
    document.getElementById('kart-alt').style.display = 'block';
  } catch(e) {
    document.getElementById('yukleniyor').style.display = 'none';
    document.getElementById('bulunamadi').style.display = 'block';
  }
}

async function iptalEt() {
  const btn = document.getElementById('btn-iptal');
  const mesajEl = document.getElementById('mesaj');
  btn.disabled = true;
  btn.textContent = 'İptal ediliyor…';
  mesajEl.style.display = 'none';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rezervasyonlar?id=eq.${REZ_ID}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ durum: 'iptal_edildi' })
    });
    if (!res.ok) throw new Error();
    await fetch(`${SUPABASE_URL}/rest/v1/kapali_saatler?rezervasyon_id=eq.${REZ_ID}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    }).catch(() => {});
    mesajEl.className = 'mesaj basari';
    mesajEl.textContent = '✓ Rezervasyonunuz başarıyla iptal edildi.';
    mesajEl.style.display = 'block';
    btn.textContent = 'İptal Edildi ✓';
    document.getElementById('d-durum').textContent = 'İptal edildi';
    document.getElementById('d-durum').style.color = '#b42828';
  } catch(e) {
    mesajEl.className = 'mesaj hata';
    mesajEl.textContent = '✗ Bir hata oluştu, lütfen tekrar deneyin.';
    mesajEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Rezervasyonu İptal Et';
  }
}

rezervasyonYukle();
</script>
</body>
</html>
